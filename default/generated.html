<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: rgba(255, 255, 255, 0.05);
        --surface-h: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.09);
        --text: #e8eaf0;
        --muted: rgba(232, 234, 240, 0.45);
        --accent: #5b8dee;
        --accent-glow: rgba(91, 141, 238, 0.35);
        --danger: #e05c6b;
        --radius: 14px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-weight: 400;
        overflow-x: hidden;
      }

      /* ── Background ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 60% 50% at 50% -10%,
            rgba(91, 141, 238, 0.18) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 40% 40% at 80% 90%,
            rgba(130, 80, 200, 0.1) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Layout ── */
      #app {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 56px 24px 80px;
        min-height: 100vh;
        gap: 0;
      }

      /* ── Clock ── */
      #clock {
        font-family: "Space Mono", monospace;
        font-size: clamp(64px, 10vw, 110px);
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text);
        line-height: 1;
        margin-bottom: 36px;
        user-select: none;
        text-shadow: 0 0 60px rgba(91, 141, 238, 0.25);
      }

      /* ── Search ── */
      #search-wrap {
        position: relative;
        width: 100%;
        max-width: 560px;
        margin-bottom: 56px;
      }

      #search-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 18px;
        height: 18px;
        color: var(--muted);
        pointer-events: none;
        flex-shrink: 0;
      }

      #search {
        width: 100%;
        padding: 16px 20px 16px 50px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 17px;
        font-weight: 400;
        outline: none;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          background 0.2s;
      }

      #search::placeholder {
        color: var(--muted);
      }

      #search:focus {
        border-color: var(--accent);
        background: rgba(255, 255, 255, 0.08);
        box-shadow:
          0 0 0 3px var(--accent-glow),
          0 4px 20px rgba(0, 0, 0, 0.3);
      }

      /* ── Shortcuts ── */
      #shortcuts {
        width: 100%;
        max-width: 780px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 14px;
      }

      /* ── Tile ── */
      .tile {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 10px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        text-decoration: none;
        color: var(--text);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition:
          background 0.18s,
          border-color 0.18s,
          transform 0.18s,
          box-shadow 0.18s;
        min-height: 100px;
        user-select: none;
      }

      .tile:hover {
        background: var(--surface-h);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .tile img {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .tile-fallback {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--surface-h);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
      }

      .tile-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 100%;
        padding: 0 4px;
        transition: color 0.18s;
      }

      .tile:hover .tile-name {
        color: var(--text);
      }

      /* ── Delete button ── */
      .tile-del {
        position: absolute;
        top: 7px;
        right: 7px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(224, 92, 107, 0);
        border: none;
        color: transparent;
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          color 0.15s;
        z-index: 2;
      }

      .tile:hover .tile-del {
        background: rgba(224, 92, 107, 0.18);
        color: var(--danger);
      }

      .tile-del:hover {
        background: var(--danger) !important;
        color: #fff !important;
      }

      /* ── Add button ── */
      #add-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 10px 16px;
        background: transparent;
        border: 1.5px dashed rgba(255, 255, 255, 0.15);
        border-radius: var(--radius);
        cursor: pointer;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        min-height: 100px;
        transition:
          border-color 0.18s,
          color 0.18s,
          background 0.18s,
          transform 0.18s;
      }

      #add-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(91, 141, 238, 0.06);
        transform: translateY(-3px);
      }

      #add-btn svg {
        opacity: 0.6;
        transition: opacity 0.18s;
      }
      #add-btn:hover svg {
        opacity: 1;
      }

      /* ── Modal ── */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }

      #modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      #modal {
        background: #1a1d27;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        transform: translateY(12px) scale(0.98);
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #modal-overlay.open #modal {
        transform: translateY(0) scale(1);
      }

      #modal h2 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 24px;
        color: var(--text);
      }

      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 7px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .field input {
        width: 100%;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }

      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      #modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
        justify-content: flex-end;
      }

      .btn {
        padding: 10px 22px;
        border-radius: 100px;
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-ghost {
        background: var(--surface);
        color: var(--muted);
      }
      .btn-ghost:hover {
        background: var(--surface-h);
        color: var(--text);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: #7aa4f0;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="clock">00:00</div>

      <div id="search-wrap">
        <svg
          id="search-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          id="search"
          type="text"
          placeholder="Google で検索..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div id="shortcuts">
        <!-- tiles injected here -->
        <button id="add-btn" aria-label="ショートカットを追加">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          追加
        </button>
      </div>
    </div>

    <!-- Modal -->
    <div
      id="modal-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div id="modal">
        <h2 id="modal-title">ショートカットを追加</h2>
        <div class="field">
          <label for="modal-url">URL</label>
          <input
            id="modal-url"
            type="url"
            placeholder="https://example.com"
            autocomplete="off"
          />
        </div>
        <div class="field">
          <label for="modal-name">サイト名</label>
          <input
            id="modal-name"
            type="text"
            placeholder="Example"
            autocomplete="off"
          />
        </div>
        <div id="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">キャンセル</button>
          <button class="btn btn-primary" id="modal-save">追加</button>
        </div>
      </div>
    </div>

    <script>
      /* ─── Storage key ─── */
      const STORAGE_KEY = "newtab_shortcuts_v1";

      /* ─── Load / Save ─── */
      function load() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          return [];
        }
      }

      function save(shortcuts) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(shortcuts));
      }

      /* ─── Favicon ─── */
      function faviconUrl(url) {
        try {
          const origin = new URL(url).origin;
          return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(origin)}&sz=64`;
        } catch {
          return null;
        }
      }

      function initials(name) {
        return (name || "?").trim().charAt(0).toUpperCase();
      }

      /* ─── Render tiles ─── */
      function render() {
        const shortcuts = load();
        const container = document.getElementById("shortcuts");
        const addBtn = document.getElementById("add-btn");

        // Remove existing tiles
        container.querySelectorAll(".tile").forEach((el) => el.remove());

        shortcuts.forEach((sc, idx) => {
          const a = document.createElement("a");
          a.className = "tile";
          a.href = sc.url;
          a.title = sc.name;

          // Favicon or fallback
          const fav = faviconUrl(sc.url);
          if (fav) {
            const img = document.createElement("img");
            img.src = fav;
            img.alt = sc.name;
            img.onerror = () => {
              img.replaceWith(fallbackEl(sc.name));
            };
            a.appendChild(img);
          } else {
            a.appendChild(fallbackEl(sc.name));
          }

          const nameEl = document.createElement("span");
          nameEl.className = "tile-name";
          nameEl.textContent = sc.name;
          a.appendChild(nameEl);

          // Delete button
          const del = document.createElement("button");
          del.className = "tile-del";
          del.innerHTML = "✕";
          del.title = "削除";
          del.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const list = load();
            list.splice(idx, 1);
            save(list);
            render();
          });
          a.appendChild(del);

          container.insertBefore(a, addBtn);
        });
      }

      function fallbackEl(name) {
        const div = document.createElement("div");
        div.className = "tile-fallback";
        div.textContent = initials(name);
        return div;
      }

      /* ─── Clock ─── */
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("clock").textContent = `${h}:${m}`;
      }

      updateClock();
      setInterval(updateClock, 1000);

      /* ─── Search ─── */
      const searchInput = document.getElementById("search");
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          const q = searchInput.value.trim();
          if (q)
            location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
        }
      });

      // Auto-focus
      window.addEventListener("load", () => searchInput.focus());

      /* ─── Modal ─── */
      const overlay = document.getElementById("modal-overlay");
      const modalUrl = document.getElementById("modal-url");
      const modalName = document.getElementById("modal-name");

      function openModal() {
        modalUrl.value = "";
        modalName.value = "";
        overlay.classList.add("open");
        setTimeout(() => modalUrl.focus(), 80);
      }

      function closeModal() {
        overlay.classList.remove("open");
      }

      document.getElementById("add-btn").addEventListener("click", openModal);
      document
        .getElementById("modal-cancel")
        .addEventListener("click", closeModal);

      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      document
        .getElementById("modal-save")
        .addEventListener("click", saveShortcut);
      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveShortcut();
      });

      function saveShortcut() {
        let url = modalUrl.value.trim();
        const name = modalName.value.trim();
        if (!url || !name) return;

        // Auto-add https:// if missing
        if (!/^https?:\/\//i.test(url)) url = "https://" + url;

        const list = load();
        list.push({ url, name });
        save(list);
        render();
        closeModal();
      }

      /* ─── Init ─── */
      render();
    </script>
  </body>
</html>
