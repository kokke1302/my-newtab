<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <!-- 現在時刻: JSで更新 -->
      <time id="clock">00:00</time>

      <!-- 検索バー -->
      <section id="search-wrap">
        <form
          id="search-form"
          action="https://www.google.com/search"
          method="GET"
        >
          <div id="search-container">
            <svg
              id="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              id="search"
              name="q"
              type="search"
              placeholder="Google で検索..."
              autocomplete="off"
            />
            <button
              id="search-clear"
              type="button"
              aria-label="検索をクリア"
              hidden
            >
              ✕
            </button>
          </div>
        </form>
      </section>

      <nav id="shortcuts" aria-label="クイックリンク">
        <!-- JSでタイルを注入 -->
        <button id="add-btn" aria-label="ショートカットを追加">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span>追加</span>
        </button>
      </nav>
    </main>

    <!-- モーダル・ダイアログ -->
    <dialog id="modal-overlay">
      <div id="modal">
        <h2 id="modal-title">ショートカットを追加</h2>

        <div class="field">
          <label for="modal-url">URL</label>
          <input id="modal-url" type="text" placeholder="https://example.com" />
        </div>

        <div class="field">
          <label for="modal-name">サイト名</label>
          <input id="modal-name" type="text" placeholder="Example" />
        </div>

        <div class="field">
          <label>ファビコン</label>
          <div id="favicon-row">
            <div id="favicon-preview-container">
              <div id="favicon-preview-content"></div>
            </div>
            <div id="favicon-upload-wrap">
              <label id="favicon-upload-label" for="favicon-file-input">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                画像をアップロード
              </label>
              <p id="favicon-hint">URLを入力すると自動取得されます</p>
            </div>
          </div>
          <input
            id="favicon-file-input"
            type="file"
            accept="image/*"
            style="display: none"
          />
        </div>

        <div id="modal-actions">
          <!-- type="button" → submit イベントを発生させない -->
          <button id="modal-cancel" class="btn btn-ghost" type="button">
            キャンセル
          </button>
          <button id="modal-save" class="btn btn-primary" type="button">
            追加
          </button>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
